<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POPNOW - Resetting Password...</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #FF69B4, #7952B3);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      text-align: center;
    }
    .container { padding: 20px; }
    h2 { font-size: 24px; margin-bottom: 8px; }
    p { font-size: 16px; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Redirecting to POPNOW...</h2>
    <p>Opening the app to reset your password.</p>
  </div>
  <script>
    var hash = window.location.hash.substring(1);
    if (hash) {
      var hashParams = new URLSearchParams(hash);
      hashParams.delete('type');
      window.location.href = 'popnow://auth/callback?type=recovery&' + hashParams.toString();
    } else {
      var query = window.location.search.substring(1);
      if (query) {
        var queryParams = new URLSearchParams(query);
        queryParams.delete('type');
        window.location.href = 'popnow://auth/callback?type=recovery&' + queryParams.toString();
      } else {
        document.querySelector('h2').textContent = 'Link expired';
        document.querySelector('p').textContent = 'Please request a new password reset from the app.';
      }
    }
  </script>
</body>
</html>
